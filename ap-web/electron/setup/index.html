<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Omnigents — Connect</title>
    <style>
      /* Design tokens lifted from ap-web/src/index.css (:root and .dark) so
         this bundled page matches the web UI it hands off to. */
      :root {
        color-scheme: light dark;
        --background: #fff;
        --foreground: #11171c;
        --muted-foreground: #6f6f6f;
        --border: #e8ecf0;
        --primary: #11171c;
        --primary-foreground: #fff;
        --destructive: #c8324c;
        --ring: #11171c;
        --radius-lg: 0.5rem;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --background: #1e1927;
          --foreground: oklch(0.965 0.003 240);
          --muted-foreground: #92a4b3;
          --border: oklch(0.28 0.005 240);
          --primary: #e8ecf0;
          --primary-foreground: #11171c;
          --destructive: #e65b77;
          --ring: #e8ecf0;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji",
          "Segoe UI Symbol", "Noto Color Emoji";
        background: var(--background);
        color: var(--foreground);
        padding: 0 16px;
      }
      .card {
        width: 100%;
        max-width: 24rem;
      }
      .logo {
        display: block;
        margin: 0 auto 12px;
        height: 80px;
      }
      p.sub {
        margin: 0 0 24px;
        color: var(--muted-foreground);
        font-size: 14px;
        line-height: 1.45;
        text-align: center;
      }
      label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 8px;
      }
      input {
        width: 100%;
        padding: 8px 12px;
        font-size: 14px;
        font-family: inherit;
        border-radius: var(--radius-lg);
        border: 1px solid var(--border);
        background: transparent;
        color: var(--foreground);
        outline: none;
      }
      input::placeholder {
        color: var(--muted-foreground);
      }
      input:focus-visible {
        border-color: var(--ring);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 50%, transparent);
      }
      button {
        width: 100%;
        font-size: 14px;
        font-family: inherit;
        border-radius: var(--radius-lg);
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      /* Connect (to a remote server) is the secondary path, below the prominent
         "Run locally" action that leads the card. */
      #connect {
        margin-top: 16px;
        padding: 9px 12px;
        font-weight: 500;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--foreground);
      }
      #connect:hover:not(:disabled) {
        background: color-mix(in srgb, var(--foreground) 5%, transparent);
      }
      .recents {
        margin-top: 24px;
      }
      .recents-title {
        margin: 0 0 8px;
        font-size: 13px;
        font-weight: 500;
        color: var(--muted-foreground);
      }
      .recent-btn {
        margin-top: 6px;
        padding: 8px 12px;
        text-align: left;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--foreground);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .recent-btn:hover {
        background: color-mix(in srgb, var(--foreground) 5%, transparent);
      }
      .err {
        margin-top: 12px;
        color: var(--destructive);
        font-size: 13px;
        line-height: 1.4;
        min-height: 18px;
      }
      /* Separator between the prominent "Run locally" action and the
         connect-to-a-server form below it. */
      .divider {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 20px 0;
        color: var(--muted-foreground);
        font-size: 12px;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      /* "Run locally" — the prominent primary action (filled), leading the
         card above the connect form. */
      #start-local {
        margin-top: 0;
        padding: 10px 12px;
        font-weight: 600;
        border: none;
        background: var(--primary);
        color: var(--primary-foreground);
      }
      #start-local:hover:not(:disabled) {
        background: color-mix(in srgb, var(--primary) 90%, transparent);
      }
      .cli-panel {
        margin-top: 16px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        font-size: 13px;
        line-height: 1.45;
      }
      .cli-panel .title {
        font-weight: 500;
        margin: 0 0 6px;
      }
      .cli-panel p {
        margin: 6px 0;
      }
      .cli-cmd {
        display: flex;
        gap: 8px;
        align-items: stretch;
        margin: 8px 0;
      }
      .cli-cmd code {
        flex: 1;
        padding: 6px 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        background: color-mix(in srgb, var(--foreground) 5%, transparent);
        border-radius: 6px;
        overflow-x: auto;
        white-space: nowrap;
      }
      .mini-btn,
      .path-row button {
        width: auto;
        flex: none;
        padding: 6px 12px;
        font-size: 12px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--foreground);
      }
      .path-row {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }
      .path-row input {
        flex: 1;
      }
      .cli-note {
        margin-top: 6px;
        font-size: 12px;
        color: var(--muted-foreground);
        min-height: 16px;
      }
      .cli-note.bad {
        color: var(--destructive);
      }
      /* "Connect this machine as a runner" toggle, next to Connect. */
      .host-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 16px;
        font-size: 14px;
        cursor: pointer;
        user-select: none;
      }
      .host-row.disabled {
        opacity: 0.5;
        cursor: default;
      }
      .host-row input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }
      .switch {
        position: relative;
        width: 34px;
        height: 20px;
        flex: none;
        border-radius: 999px;
        background: color-mix(in srgb, var(--foreground) 22%, transparent);
        transition: background 0.15s;
      }
      .switch::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--background);
        transition: transform 0.15s;
      }
      .host-row input:checked + .switch {
        background: var(--primary);
      }
      .host-row input:checked + .switch::after {
        transform: translateX(14px);
      }
      .host-row input:focus-visible + .switch {
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 50%, transparent);
      }
      /* With the native title bar hidden (titleBarStyle "hiddenInset" on
         macOS), this strip is the window's only drag surface on the setup
         page. Harmless elsewhere. */
      .drag-strip {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 36px;
        -webkit-app-region: drag;
      }
    </style>
  </head>
  <body>
    <div class="drag-strip"></div>
    <div class="card">
      <picture>
        <source
          srcset="../../platform-assets/logos/omnigents-logo-reverse.svg"
          media="(prefers-color-scheme: dark)"
        />
        <img class="logo" src="../../platform-assets/logos/omnigents-logo.svg" alt="Omnigents" />
      </picture>
      <p class="sub">Run an Omnigents server on this machine, or connect to an existing one.</p>
      <div id="local-section">
        <button id="start-local" disabled>Run locally</button>

        <div class="cli-panel" id="cli-panel" hidden>
          <p class="title" id="cli-title"></p>
          <div id="cli-install" hidden>
            <p>Install the Omnigent CLI to run a server locally:</p>
            <div class="cli-cmd">
              <code id="cli-cmd-text"></code>
              <button type="button" class="mini-btn" id="cli-copy">Copy</button>
            </div>
            <p>Already installed? Point the app at the binary:</p>
            <div class="path-row">
              <input
                id="cli-path"
                type="text"
                placeholder="/path/to/omnigent"
                autocomplete="off"
                spellcheck="false"
              />
              <button type="button" id="cli-browse">Browse…</button>
            </div>
            <p class="cli-note" id="cli-path-note"></p>
          </div>
        </div>

        <div class="divider">or connect to a server</div>
      </div>

      <label for="url">Server URL</label>
      <input
        id="url"
        type="text"
        placeholder="http://localhost:6767"
        autocomplete="off"
        spellcheck="false"
      />
      <label class="host-row disabled" id="host-row" hidden>
        <input type="checkbox" id="host-toggle" disabled />
        <span class="switch" aria-hidden="true"></span>
        <span>Connect this machine as a runner to this server</span>
      </label>
      <button id="connect">Connect</button>
      <div class="err" id="err"></div>

      <div class="recents" id="recents" hidden>
        <p class="recents-title">Recent servers</p>
        <div id="recents-list"></div>
      </div>
    </div>
    <script src="../src/url.js"></script>
    <script>
      // Shared URL helpers (electron/src/url.js), exposed as window.omnigentUrl
      // — the same module the main process uses, so the two never drift.
      const { isPlainHttpRemote } = window.omnigentUrl;
      // Uses the Electron preload bridge (electron/src/preload.js).
      const setup = window.omnigentSetup;
      const input = document.getElementById("url");
      const button = document.getElementById("connect");
      const err = document.getElementById("err");

      // The main process loads this page with ?error=…&url=… when a server
      // navigation fails (server down, DNS, TLS), so the user sees what went
      // wrong and can retry or change the URL.
      const params = new URLSearchParams(location.search);
      const failedUrl = params.get("url");
      const loadError = params.get("error");
      // Multi-server mode (Server → New Window on Different Server…): the
      // connection applies to this window only and is never saved.
      const isEphemeral = params.get("ephemeral") === "1";
      if (loadError) {
        // textContent, never innerHTML: both values come from the query
        // string and must be rendered as inert text.
        err.textContent = failedUrl ? `Could not load ${failedUrl}: ${loadError}` : loadError;
      }
      if (isEphemeral) {
        document.querySelector("p.sub").textContent =
          "Connect this window to a different server. The URL applies to " +
          "this window only and is not saved.";
      }

      // Pre-fill with the URL that just failed (retry is the common next
      // step), else any previously-saved URL — except in ephemeral mode,
      // where the whole point is a *different* server than the saved one.
      if (failedUrl) {
        input.value = failedUrl;
      } else if (!isEphemeral) {
        setup
          .getServerUrl()
          .then((saved) => {
            input.value = saved || "http://localhost:6767";
          })
          .catch(() => {
            input.value = "http://localhost:6767";
          });
      }

      // Recently-connected servers (persisted by the main process on every
      // successful non-ephemeral Connect). Clicking one fills the input and
      // connects immediately; the plain-http warning in connect() still
      // applies. An empty/unavailable list keeps the section hidden — the
      // form works without it.
      const recentsSection = document.getElementById("recents");
      const recentsList = document.getElementById("recents-list");
      setup
        .getRecentServers()
        .then((recents) => {
          if (!Array.isArray(recents) || recents.length === 0) return;
          for (const url of recents) {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "recent-btn";
            // textContent, never innerHTML: the URL comes from disk and must
            // be rendered as inert text.
            btn.textContent = url;
            btn.addEventListener("click", () => {
              input.value = url;
              connect();
            });
            recentsList.appendChild(btn);
          }
          recentsSection.hidden = false;
        })
        .catch(() => {});

      // The exact URL value the user has already been warned about — a
      // second Connect click on the same value proceeds; editing the input
      // re-arms the warning.
      let warnedFor = null;

      async function connect() {
        err.textContent = "";
        const value = input.value;
        if (isPlainHttpRemote(value) && warnedFor !== value) {
          warnedFor = value;
          err.textContent =
            "Warning: unencrypted http:// to a remote host — anyone on the " +
            "network path can act as this server. Click Connect again to proceed.";
          return;
        }
        button.disabled = true;
        try {
          // setServerUrl persists the URL and navigates this window to it —
          // after which the server's SPA takes over the window. The host flag
          // also registers this machine as a host once the server loads.
          await setup.setServerUrl(value, { host: hostToggle.checked });
        } catch (e) {
          err.textContent = String(e && e.message ? e.message : e);
          button.disabled = false;
        }
      }

      button.addEventListener("click", connect);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") connect();
      });

      // --- Run locally + omnigent CLI detection ---------------------------
      // "Run locally" runs `omnigent server` via the main process, then
      // connects this window to it through the normal flow. It
      // needs the local omnigent CLI, so we detect the CLI on load and, when
      // it's missing, show install instructions plus a way to point at the
      // binary. Remote Connect never depends on the CLI.
      const startLocalBtn = document.getElementById("start-local");
      const localSection = document.getElementById("local-section");
      const cliPanel = document.getElementById("cli-panel");
      const cliTitle = document.getElementById("cli-title");
      const cliInstall = document.getElementById("cli-install");
      const cliCmdText = document.getElementById("cli-cmd-text");
      const cliCopy = document.getElementById("cli-copy");
      const cliPathInput = document.getElementById("cli-path");
      const cliBrowse = document.getElementById("cli-browse");
      const cliPathNote = document.getElementById("cli-path-note");
      const hostRow = document.getElementById("host-row");
      const hostToggle = document.getElementById("host-toggle");
      // Saved "host on connect" preference; pre-sets the toggle once the CLI
      // is confirmed present.
      let hostPref = false;

      // Copy without a clipboard permission: a transient off-screen textarea +
      // execCommand works on a user gesture in the file:// setup page.
      function copyText(text) {
        try {
          const ta = document.createElement("textarea");
          ta.value = text;
          ta.setAttribute("readonly", "");
          ta.style.position = "fixed";
          ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
          return true;
        } catch {
          return false;
        }
      }

      async function refreshCliStatus() {
        let status;
        try {
          status = await setup.getCliStatus();
        } catch {
          return;
        }
        // textContent, never innerHTML: the command and version come from the
        // main process and are rendered as inert text.
        cliCmdText.textContent = status.installCommand || "";
        const installed = Boolean(status.installed);
        // Hosting needs the CLI; gate both the toggle and Start-locally on it.
        startLocalBtn.disabled = !installed;
        hostToggle.disabled = !installed;
        hostRow.classList.toggle("disabled", !installed);
        hostToggle.checked = installed && hostPref;
        if (installed) {
          cliPanel.hidden = true;
        } else {
          cliPanel.hidden = false;
          cliInstall.hidden = false;
          cliTitle.textContent = "Omnigent CLI not found";
        }
      }

      async function applyCliPath(value) {
        const p = (value || "").trim();
        if (p === "") return;
        cliPathNote.className = "cli-note";
        cliPathNote.textContent = "Checking…";
        let result;
        try {
          result = await setup.setCliPath(p);
        } catch {
          result = { accepted: false };
        }
        if (result && result.accepted) {
          cliPathNote.textContent = result.version ? `Found: ${result.version}` : "Found omnigent.";
          await refreshCliStatus();
        } else {
          cliPathNote.className = "cli-note bad";
          cliPathNote.textContent = "That path is not a runnable omnigent binary.";
        }
      }

      if (setup.getCliStatus) {
        cliCopy.addEventListener("click", () => {
          if (copyText(cliCmdText.textContent)) {
            cliCopy.textContent = "Copied";
            setTimeout(() => {
              cliCopy.textContent = "Copy";
            }, 1500);
          }
        });
        cliBrowse.addEventListener("click", async () => {
          const picked = await setup.browseCliPath();
          if (picked) {
            cliPathInput.value = picked;
            await applyCliPath(picked);
          }
        });
        cliPathInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") applyCliPath(cliPathInput.value);
        });
        startLocalBtn.addEventListener("click", async () => {
          err.textContent = "";
          const prev = startLocalBtn.textContent;
          startLocalBtn.disabled = true;
          startLocalBtn.textContent = "Starting…";
          try {
            const result = await setup.startLocalServer();
            if (result && result.ok && result.url) {
              // Hand off to the normal connect/navigate flow; on success the
              // window loads the server and this page goes away. Carry the host
              // choice through so a local server can host this machine too.
              input.value = result.url;
              await setup.setServerUrl(result.url, { host: hostToggle.checked });
              return;
            }
            err.textContent = (result && result.error) || "Could not start the local server.";
          } catch (e) {
            err.textContent = String(e && e.message ? e.message : e);
          }
          startLocalBtn.textContent = prev;
          startLocalBtn.disabled = false;
        });
        // Reveal the host toggle and seed it from the saved preference, then
        // resolve CLI status (which enables/disables it).
        hostRow.hidden = false;
        const prefP = setup.getHostOnConnect
          ? setup.getHostOnConnect().catch(() => false)
          : Promise.resolve(false);
        prefP.then((on) => {
          hostPref = Boolean(on);
          refreshCliStatus();
        });
      } else {
        // Older shell without the CLI bridge: hide the whole local section.
        localSection.hidden = true;
      }

      input.focus();
    </script>
  </body>
</html>
