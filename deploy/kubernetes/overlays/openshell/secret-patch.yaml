apiVersion: v1
kind: Secret
metadata:
  name: omnigent-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql+psycopg://omnigent:changeme@your-db-host:5432/omnigent"
  # Generate with: openssl rand -hex 32
  OMNIGENT_ACCOUNTS_COOKIE_SECRET: "changeme"
  # --- LLM credentials injected into OpenShell sandboxes ------------------
  # The server passes these to sandboxes at provision time (via
  # sandbox.openshell.env). Set the ones your harness needs.
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  GEMINI_API_KEY: ""
