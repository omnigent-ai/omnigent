---
# Harness credentials projected into every runner Pod via `envFrom` (the
# launcher reads `sandbox.kubernetes.secret_name` and adds a secretRef to the
# init + host containers). Inside the Pod, `git clone` uses GIT_TOKEN and
# `omnigent host` forwards the LLM credentials to the agent runner.
#
# This is SEPARATE from the per-launch token Secret the launcher creates and
# deletes per Pod (which carries only OMNIGENT_HOST_TOKEN) — these are the
# long-lived, operator-managed harness credentials shared across runners.
#
# EDIT before applying: replace the placeholders with real values, and delete
# the keys your agents don't use. These are EXAMPLE values — do not apply as-is.
# For production prefer a sealed-secret / external-secrets operator over a
# checked-in manifest.
apiVersion: v1
kind: Secret
metadata:
  name: omnigent-creds
  namespace: omnigent-sandboxes
  labels:
    app.kubernetes.io/name: omnigent
    app.kubernetes.io/component: runner
type: Opaque
stringData:
  # Anthropic / Claude (use ONE of API key or OAuth subscription token):
  ANTHROPIC_API_KEY: "sk-ant-REPLACE_ME"
  # CLAUDE_CODE_OAUTH_TOKEN: "REPLACE_ME"   # from `claude setup-token`
  # OpenAI / Codex:
  OPENAI_API_KEY: "sk-REPLACE_ME"
  # CODEX_ACCESS_TOKEN: "REPLACE_ME"        # ChatGPT Business/Enterprise
  # Gemini:
  # GEMINI_API_KEY: "REPLACE_ME"
  # Git (HTTPS clone/push from agents):
  # GIT_TOKEN: "ghp_REPLACE_ME"
  # GIT_USERNAME: "x-access-token"
