---
# Dedicated namespace for the on-demand agent-runner Pods (tri-model FIX-1).
# Kept SEPARATE from the server namespace (`omnigent`) so the server SA's Pod
# create/get/delete + pods/exec rights — scoped to this namespace via role.yaml
# + rolebinding.yaml — can never reach the server/DB Pods or the server's
# Secrets. The runner SA, the harness-credentials Secret, the Role and the
# RoleBinding all live here; only the omnigent-server SA stays in `omnigent`.
apiVersion: v1
kind: Namespace
metadata:
  name: omnigent-sandboxes
  labels:
    app.kubernetes.io/name: omnigent
    app.kubernetes.io/component: runner
