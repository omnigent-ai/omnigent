apiVersion: v1
kind: Secret
metadata:
  name: omnigent-secrets
type: Opaque
stringData:
  # Provider API credentials — set the pair matching sandbox.provider.
  # (Replace every "changeme"; prefer a sealed-secret / external-secrets
  # operator over committing real values.)
  CWSANDBOX_API_KEY: "changeme"
  # CWSANDBOX_BASE_URL: "https://…"   # optional
  # MODAL_TOKEN_ID: "changeme"
  # MODAL_TOKEN_SECRET: "changeme"
  # DAYTONA_API_KEY: "changeme"
  # ISLO_API_KEY: "changeme"

  # LLM / git credentials injected into sandboxes — the NAMES here must match
  # the `env:` list in sandbox-config.yaml.
  ANTHROPIC_API_KEY: "changeme"
  OPENAI_API_KEY: "changeme"
  GIT_TOKEN: "changeme"
