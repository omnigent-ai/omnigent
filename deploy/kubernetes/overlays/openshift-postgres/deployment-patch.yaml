apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnigent
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        # Base pins uid/gid/fsGroup 10001 for vanilla k8s; OpenShift's SCC
        # assigns these from the namespace range and rejects an out-of-range
        # runAsUser — null them (strategic-merge delete) to defer to the SCC.
        runAsUser: null
        runAsGroup: null
        fsGroup: null
      containers:
        - name: omnigent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
