apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnigent
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        # The base pins uid/gid/fsGroup 10001 for vanilla k8s. OpenShift's
        # restricted SCC assigns a uid from the namespace range and manages
        # fsGroup itself, and REJECTS an out-of-range runAsUser — so null these
        # (strategic-merge delete) to hand control back to the SCC.
        runAsUser: null
        runAsGroup: null
        fsGroup: null
      containers:
        - name: omnigent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
