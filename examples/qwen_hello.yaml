# Qwen Hello World — the simplest possible Omnigent agent with Qwen Code.
#
# Quick start:
#
#   1. Install Qwen Code:
#      npm install -g @qwen/qwen-code
#      qwen login  # authenticate if needed
#
#   2. Configure a provider in ~/.omnigent/config.yaml (or set API key):
#      providers:
#        openai:
#          kind: key
#          default: true
#          openai:
#            base_url: https://api.openai.com/v1
#            api_key: sk-...
#
#   3. Run it:
#      cd omnigent
#      python -m omnigent examples/qwen_hello.yaml --prompt "Hello!"
#
#   4. Or run interactively:
#      python -m omnigent examples/qwen_hello.yaml
#
# The model name below uses a typical Qwen Code model.
# If you want to use a different model, override with --model:
#      python -m omnigent examples/qwen_hello.yaml --model qwen/qwen-2.5-coder

name: qwen_hello
prompt: You are Qwen Code, running through Omnigent. Help the user with software engineering tasks.

executor:
  harness: qwen
  model: qwen/qwen-plus
