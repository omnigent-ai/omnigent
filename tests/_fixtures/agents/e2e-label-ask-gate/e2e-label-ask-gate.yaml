name: e2e-label-ask-gate
description: |
  E2E fixture: label-driven ASK composition.

executor:
  model: databricks-gpt-5-4-mini

prompt: |
  # E2E label-ask-gate agent

  Tiny test agent. Reply briefly (under 20 words). Do not
  mention policies or guardrails in your replies.

labels:
  tainted: "0"

label_schema:
  tainted:
    values: ["0", "1"]
    monotonic: max

policies:
  taint_on_banana:
    type: function
    handler: omnigent._e2e_policy_callables.taint_on_banana

  ask_when_tainted:
    type: function
    on: [request]
    condition:
      tainted: "1"
    function:
      path: omnigent.policies.function.make_fixed_action_callable
      arguments:
        action: ask
        reason: Conversation is tainted — confirm before continuing.
        on_phases: [request]
