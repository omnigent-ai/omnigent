<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1052" height="452" viewBox="0 0 1052 452">
  <defs>
    <style>text { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; }</style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="236" y="62" font-size="22" fill="#1971c2" opacity="1"><tspan x="236" dy="0">W3C TRACEPARENT injection: subprocess trace nesting</tspan></text>
  <text x="216" y="104" font-size="14" fill="#868e96" opacity="1"><tspan x="216" dy="0">Before (on main)</tspan></text>
  <text x="716" y="104" font-size="14" fill="#868e96" opacity="1"><tspan x="716" dy="0">After (this PR)</tspan></text>
  <rect x="40" y="124" width="472" height="80" rx="8" stroke="#1971c2" fill="#1971c2" stroke-width="1" opacity="1" />
  <text x="56" y="149" font-size="13" fill="#f8f9fa" opacity="1"><tspan x="56" dy="0">omnigent server process</tspan></text>
  <text x="56" y="172" font-size="12" fill="#f8f9fa" opacity="1"><tspan x="56" dy="0">agent:debby span</tspan></text>
  <text x="56" y="189" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="56" dy="0">trace_id = 6fe85701...3b98</tspan></text>
  <rect x="40" y="224" width="472" height="60" rx="8" stroke="#868e96" fill="#868e96" stroke-width="1" opacity="1" />
  <text x="56" y="248" font-size="12" fill="#f8f9fa" opacity="1"><tspan x="56" dy="0">subprocess.Popen(env = {...})</tspan></text>
  <text x="56" y="269" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="56" dy="0">(no TRACEPARENT in env)</tspan></text>
  <rect x="40" y="304" width="472" height="108" rx="8" stroke="#c92a2a" fill="#c92a2a" stroke-width="1" opacity="1" />
  <text x="56" y="329" font-size="13" fill="#f8f9fa" opacity="1"><tspan x="56" dy="0">Claude SDK subprocess</tspan></text>
  <text x="56" y="352" font-size="12" fill="#f8f9fa" opacity="1"><tspan x="56" dy="0">starts its own trace:</tspan></text>
  <text x="56" y="371" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="56" dy="0">  chat span (NEW trace_id = a1b2c3...)</tspan></text>
  <text x="56" y="389" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="56" dy="0">  tool span (under that NEW trace_id)</tspan></text>
  <text x="56" y="407" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="56" dy="0">  Operator sees TWO traces, not one</tspan></text>
  <rect x="540" y="124" width="472" height="80" rx="8" stroke="#1971c2" fill="#1971c2" stroke-width="1" opacity="1" />
  <text x="556" y="149" font-size="13" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">omnigent server process</tspan></text>
  <text x="556" y="172" font-size="12" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">agent:debby span</tspan></text>
  <text x="556" y="189" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">trace_id = 6fe85701...3b98</tspan></text>
  <rect x="540" y="224" width="472" height="60" rx="8" stroke="#fab005" fill="#fab005" stroke-width="1" opacity="1" />
  <text x="556" y="247" font-size="11" fill="#212529" opacity="1"><tspan x="556" dy="0">_build_claude_sdk_spawn_env + get_otel_subprocess_env</tspan></text>
  <text x="556" y="269" font-size="11" fill="#212529" opacity="1"><tspan x="556" dy="0">TRACEPARENT = 00-6fe85701...3b98-...01-01</tspan></text>
  <rect x="540" y="304" width="472" height="108" rx="8" stroke="#087f5b" fill="#087f5b" stroke-width="1" opacity="1" />
  <text x="556" y="329" font-size="13" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">Claude SDK subprocess</tspan></text>
  <text x="556" y="352" font-size="12" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">joins parent trace via TRACEPARENT:</tspan></text>
  <text x="556" y="371" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">  chat span (SAME trace_id = 6fe85701...)</tspan></text>
  <text x="556" y="389" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">  tool span (under agent:debby in the tree)</tspan></text>
  <text x="556" y="407" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">  One unified trace, one click in the UI</tspan></text>
</svg>