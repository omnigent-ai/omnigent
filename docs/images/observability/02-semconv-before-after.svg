<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1052" height="672" viewBox="0 0 1052 672">
  <defs>
    <style>text { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; }</style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="256" y="62" font-size="22" fill="#1971c2" opacity="1"><tspan x="256" dy="0">GenAI semconv attributes: before (main) vs after (this PR)</tspan></text>
  <text x="216" y="108" font-size="14" fill="#868e96" opacity="1"><tspan x="216" dy="0">Before (on main)</tspan></text>
  <text x="716" y="108" font-size="14" fill="#868e96" opacity="1"><tspan x="716" dy="0">After (this PR)</tspan></text>
  <rect x="40" y="128" width="472" height="160" rx="8" stroke="#1971c2" fill="#1971c2" stroke-width="1" opacity="1" />
  <text x="56" y="153" font-size="15" fill="#f8f9fa" opacity="1"><tspan x="56" dy="0">agent:debby</tspan></text>
  <text x="56" y="179" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="56" dy="0">agent.name = &quot;debby&quot;</tspan></text>
  <text x="56" y="197" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="56" dy="0">model     = &quot;anthropic/claude-sonnet-4-5&quot;</tspan></text>
  <text x="56" y="233" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="56" dy="0">(no gen_ai.* attributes set)</tspan></text>
  <rect x="540" y="128" width="472" height="160" rx="8" stroke="#1971c2" fill="#1971c2" stroke-width="1" opacity="1" />
  <text x="556" y="153" font-size="15" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">agent:debby</tspan></text>
  <text x="556" y="179" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">agent.name             = &quot;debby&quot;</tspan></text>
  <text x="556" y="197" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">model                  = &quot;anthropic/claude-sonnet-4-5&quot;</tspan></text>
  <text x="556" y="215" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">gen_ai.operation.name  = &quot;invoke_agent&quot;</tspan></text>
  <text x="556" y="233" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">gen_ai.agent.name      = &quot;debby&quot;</tspan></text>
  <text x="556" y="251" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">gen_ai.provider.name   = &quot;anthropic&quot;</tspan></text>
  <text x="556" y="269" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">gen_ai.request.model   = &quot;claude-sonnet-4-5&quot;</tspan></text>
  <rect x="40" y="300" width="472" height="160" rx="8" stroke="#3b5bdb" fill="#3b5bdb" stroke-width="1" opacity="1" />
  <text x="56" y="325" font-size="15" fill="#f8f9fa" opacity="1"><tspan x="56" dy="0">llm_call</tspan></text>
  <text x="56" y="351" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="56" dy="0">model                  = &quot;anthropic/claude-sonnet-4-5&quot;</tspan></text>
  <text x="56" y="369" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="56" dy="0">mlflow.chat.tokenUsage = {...}</tspan></text>
  <text x="56" y="405" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="56" dy="0">(no gen_ai.* attributes set)</tspan></text>
  <rect x="540" y="300" width="472" height="160" rx="8" stroke="#3b5bdb" fill="#3b5bdb" stroke-width="1" opacity="1" />
  <text x="556" y="325" font-size="15" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">llm_call</tspan></text>
  <text x="556" y="351" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">model                  = &quot;anthropic/claude-sonnet-4-5&quot;</tspan></text>
  <text x="556" y="369" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">mlflow.chat.tokenUsage = {...}</tspan></text>
  <text x="556" y="387" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">gen_ai.operation.name  = &quot;chat&quot;</tspan></text>
  <text x="556" y="405" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">gen_ai.provider.name   = &quot;anthropic&quot;</tspan></text>
  <text x="556" y="423" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">gen_ai.request.model   = &quot;claude-sonnet-4-5&quot;</tspan></text>
  <rect x="40" y="472" width="472" height="160" rx="8" stroke="#087f5b" fill="#087f5b" stroke-width="1" opacity="1" />
  <text x="56" y="497" font-size="15" fill="#f8f9fa" opacity="1"><tspan x="56" dy="0">tool:calculator</tspan></text>
  <text x="56" y="523" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="56" dy="0">(no gen_ai.* attributes set)</tspan></text>
  <text x="56" y="559" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="56" dy="0">Opaque to non-MLflow OTel</tspan></text>
  <text x="56" y="577" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="56" dy="0">backends like Jaeger / Tempo</tspan></text>
  <rect x="540" y="472" width="472" height="160" rx="8" stroke="#087f5b" fill="#087f5b" stroke-width="1" opacity="1" />
  <text x="556" y="497" font-size="15" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">tool:calculator</tspan></text>
  <text x="556" y="523" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">gen_ai.operation.name  = &quot;execute_tool&quot;</tspan></text>
  <text x="556" y="541" font-size="11" fill="#f8f9fa" opacity="1"><tspan x="556" dy="0">tool.name              = &quot;calculator&quot;</tspan></text>
