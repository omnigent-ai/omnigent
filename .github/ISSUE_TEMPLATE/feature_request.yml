name: Feature Request
description: Suggest a new capability, enhancement, or improvement.
title: "[Feature]: "
labels: ["enhancement"]

body:

* type: markdown
  attributes:
  value: |
  Thanks for suggesting an improvement. Please focus on the problem you're trying to solve and how the proposed feature would help users or contributors.

* type: textarea
  id: problem
  attributes:
  label: Problem statement
  description: What limitation, pain point, or missing capability does this address?
  validations:
  required: true

* type: textarea
  id: proposed-solution
  attributes:
  label: Proposed solution
  description: Describe the feature or improvement you would like to see.
  validations:
  required: true

* type: textarea
  id: usefulness
  attributes:
  label: Why is this useful?
  description: Explain the value this feature would provide to OmniGent users or contributors.
  validations:
  required: true

* type: textarea
  id: use-case
  attributes:
  label: Use case
  description: Describe a real-world scenario where this feature would be beneficial.
  placeholder: |
  Example:
  - Building autonomous workflows
  - Integrating additional AI models
  - Improving agent reliability
  - Enhancing developer experience

* type: textarea
  id: alternatives
  attributes:
  label: Alternatives considered
  description: Have you considered any alternative approaches or workarounds?

* type: textarea
  id: implementation-ideas
  attributes:
  label: Implementation ideas
  description: Optional notes, design suggestions, or technical considerations.

* type: textarea
  id: additional-context
  attributes:
  label: Additional context
  description: Include examples, references, mockups, screenshots, related projects, or research that may help explain the idea.
