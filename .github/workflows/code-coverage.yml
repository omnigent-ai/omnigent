name: Code Coverage

# Coverage ratchet for the backend pytest suite, driven by the `coverage-summary`
# artifact the CI workflow produces (on PRs *and* on push to main). Runs on
# workflow_run (privileged, statuses:write) but does NOT check out PR code — it
# only consumes the artifact and the GitHub API, so it isn't a "dangerous
# workflow".
#
# Baseline storage: the latest coverage on main is kept as the `Coverage` commit
# status on main's HEAD (no committed file, so no bot push to a protected main
# and no CI re-trigger). On push to main this job records that status; on a PR it
# reads main's status as the baseline and fails the PR's `Coverage` status when
# coverage drops below it (beyond COVERAGE_TOLERANCE).
#
# Soft rollout: while COVERAGE_ENFORCE is "false" a regression is reported as a
# success status annotated "would fail once enforced" — never a red ✗. To turn on
# real red statuses, set COVERAGE_ENFORCE: "true"; to make them actually block a
# merge, also mark `Coverage` a required status check in branch protection.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

# Read-only at the top level; write scopes live on the job below.
permissions:
  contents: read

concurrency:
  group: code-coverage-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

env:
  # Absorbs coverage nondeterminism (parallel shards, sysmon line-only backend)
  # so a tiny jitter doesn't fail a PR. A real regression clears this easily.
  COVERAGE_TOLERANCE: "0.5"
  # "false" = observe only: a regression posts a success status annotated
  # "would fail once enforced" instead of a red ✗. Set "true" to post real
  # failure statuses once the gate has run cleanly for a while.
  COVERAGE_ENFORCE: "false"

jobs:
  post:
    name: Post coverage status
    permissions:
      actions: read     # download the coverage-summary artifact from the CI run
      contents: read    # read main's baseline status via the commits API
      statuses: write   # post the Coverage status on the head SHA
    # PR runs (gate) and pushes to main (record baseline). Other completions have
    # no PR head SHA / aren't the baseline branch.
    if: >-
      ${{ github.event.workflow_run.event == 'pull_request' ||
          (github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Data only — never the PR's code. Tolerate a missing artifact (fork PRs,
      # or CI that produced no coverage) via the no-data guard below.
      - name: Download coverage summary
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          name: coverage-summary-${{ github.event.workflow_run.id }}
          path: coverage-summary

      - name: Evaluate coverage and post status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          EVENT: ${{ github.event.workflow_run.event }}
        run: |
          set -euo pipefail
          if [[ ! -f coverage-summary/total.txt ]]; then
            echo "::notice::No coverage-summary artifact; nothing to post."
            exit 0
          fi
          TOTAL=$(tr -d '[:space:]' < coverage-summary/total.txt)

          # On main: record the new baseline as the Coverage status on this commit.
          if [[ "$EVENT" == "push" ]]; then
            gh api "repos/$REPO/statuses/$SHA" \
              -f state=success \
              -f context=Coverage \
              -f description="Total coverage: ${TOTAL}%" >/dev/null
            echo "Recorded baseline Coverage=${TOTAL}% on main $SHA"
            exit 0
          fi

          # On a PR: baseline = the Coverage status on main's HEAD.
          BASE_DESC=$(gh api "repos/$REPO/commits/main/status" \
            -q '.statuses[] | select(.context=="Coverage") | .description' 2>/dev/null | head -n1 || true)
          BASELINE=$(printf '%s' "$BASE_DESC" | grep -oE '[0-9]+(\.[0-9]+)?' | head -n1 || true)

          if [[ -z "$BASELINE" ]]; then
            # No baseline recorded on main yet (first rollout) — report, don't gate.
            gh api "repos/$REPO/statuses/$SHA" \
              -f state=success \
              -f context=Coverage \
              -f description="Total coverage: ${TOTAL}% (no baseline yet)" >/dev/null
            echo "::notice::No Coverage baseline on main yet; reported ${TOTAL}% without gating."
            exit 0
          fi

          PASS=$(awk -v c="$TOTAL" -v b="$BASELINE" -v t="$COVERAGE_TOLERANCE" \
            'BEGIN { print (c + t >= b) ? 1 : 0 }')
          if [[ "$PASS" == "1" ]]; then
            gh api "repos/$REPO/statuses/$SHA" \
              -f state=success \
              -f context=Coverage \
              -f description="Coverage ${TOTAL}% (baseline ${BASELINE}%)" >/dev/null
            echo "PASS: Coverage ${TOTAL}% >= baseline ${BASELINE}% (tol ${COVERAGE_TOLERANCE})"
          elif [[ "$COVERAGE_ENFORCE" == "true" ]]; then
            gh api "repos/$REPO/statuses/$SHA" \
              -f state=failure \
              -f context=Coverage \
              -f description="Coverage dropped: ${TOTAL}% < baseline ${BASELINE}%" >/dev/null
            echo "FAIL: Coverage ${TOTAL}% < baseline ${BASELINE}% (tol ${COVERAGE_TOLERANCE})"
          else
            # Observe-only: surface the would-be regression without a red ✗.
            gh api "repos/$REPO/statuses/$SHA" \
              -f state=success \
              -f context=Coverage \
              -f description="Coverage ${TOTAL}% < baseline ${BASELINE}% (would fail once enforced)" >/dev/null
            echo "::warning::Coverage regression (not gating): ${TOTAL}% < baseline ${BASELINE}% (tol ${COVERAGE_TOLERANCE})"
          fi
