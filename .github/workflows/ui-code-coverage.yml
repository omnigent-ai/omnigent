name: UI Code Coverage

# Coverage ratchet for the ap-web (vitest) frontend, driven by the
# `ui-coverage-summary` artifact the `ap-web Tests` workflow produces (on PRs
# *and* on push to main). Runs on workflow_run (privileged, statuses:write) but
# does NOT check out PR code — it only consumes the artifact and the GitHub API,
# so it isn't a "dangerous workflow". Frontend counterpart to code-coverage.yml.
#
# Baseline storage: the latest UI coverage on main is kept as the `Coverage (ui)`
# commit status on main's HEAD (no committed file, so no bot push to a protected
# main and no CI re-trigger). On push to main this job records that status; on a
# PR it reads main's status as the baseline and fails the PR's `Coverage (ui)`
# status when coverage drops below it (beyond COVERAGE_TOLERANCE).
#
# Soft rollout: this posts a real failure state, but until `Coverage (ui)` is
# marked a required status check in branch protection it cannot block a merge.
# Flip it to required once it has run cleanly for a week or two.

on:
  workflow_run:
    workflows: [ap-web Tests]
    types: [completed]

# Read-only at the top level; write scopes live on the job below.
permissions:
  contents: read

concurrency:
  group: ui-code-coverage-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

env:
  # Absorbs minor coverage jitter so noise doesn't fail a PR; a real regression
  # clears this easily.
  COVERAGE_TOLERANCE: "0.5"

jobs:
  post:
    name: Post UI coverage status
    permissions:
      actions: read     # download the ui-coverage-summary artifact from the run
      contents: read    # read main's baseline status via the commits API
      statuses: write   # post the Coverage (ui) status on the head SHA
    # PR runs (gate) and pushes to main (record baseline).
    if: >-
      ${{ github.event.workflow_run.event == 'pull_request' ||
          (github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Data only — never the PR's code. Tolerate a missing artifact (fork PRs,
      # or a run that produced no coverage) via the no-data guard below.
      - name: Download UI coverage summary
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          name: ui-coverage-summary-${{ github.event.workflow_run.id }}
          path: ui-coverage-summary

      - name: Evaluate UI coverage and post status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          EVENT: ${{ github.event.workflow_run.event }}
        run: |
          set -euo pipefail
          if [[ ! -f ui-coverage-summary/total.txt ]]; then
            echo "::notice::No ui-coverage-summary artifact; nothing to post."
            exit 0
          fi
          TOTAL=$(tr -d '[:space:]' < ui-coverage-summary/total.txt)

          # On main: record the new baseline as the Coverage (ui) status here.
          if [[ "$EVENT" == "push" ]]; then
            gh api "repos/$REPO/statuses/$SHA" \
              -f state=success \
              -f context="Coverage (ui)" \
              -f description="Total UI line coverage: ${TOTAL}%" >/dev/null
            echo "Recorded baseline Coverage (ui)=${TOTAL}% on main $SHA"
            exit 0
          fi

          # On a PR: baseline = the Coverage (ui) status on main's HEAD.
          BASE_DESC=$(gh api "repos/$REPO/commits/main/status" \
            -q '.statuses[] | select(.context=="Coverage (ui)") | .description' 2>/dev/null | head -n1 || true)
          BASELINE=$(printf '%s' "$BASE_DESC" | grep -oE '[0-9]+(\.[0-9]+)?' | head -n1 || true)

          if [[ -z "$BASELINE" ]]; then
            gh api "repos/$REPO/statuses/$SHA" \
              -f state=success \
              -f context="Coverage (ui)" \
              -f description="Total UI line coverage: ${TOTAL}% (no baseline yet)" >/dev/null
            echo "::notice::No Coverage (ui) baseline on main yet; reported ${TOTAL}% without gating."
            exit 0
          fi

          PASS=$(awk -v c="$TOTAL" -v b="$BASELINE" -v t="$COVERAGE_TOLERANCE" \
            'BEGIN { print (c + t >= b) ? 1 : 0 }')
          if [[ "$PASS" == "1" ]]; then
            gh api "repos/$REPO/statuses/$SHA" \
              -f state=success \
              -f context="Coverage (ui)" \
              -f description="UI coverage ${TOTAL}% (baseline ${BASELINE}%)" >/dev/null
            echo "PASS: UI coverage ${TOTAL}% >= baseline ${BASELINE}% (tol ${COVERAGE_TOLERANCE})"
          else
            gh api "repos/$REPO/statuses/$SHA" \
              -f state=failure \
              -f context="Coverage (ui)" \
              -f description="UI coverage dropped: ${TOTAL}% < baseline ${BASELINE}%" >/dev/null
            echo "FAIL: UI coverage ${TOTAL}% < baseline ${BASELINE}% (tol ${COVERAGE_TOLERANCE})"
          fi
