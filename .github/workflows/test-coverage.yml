name: Test Coverage

# Per-tier test-coverage gates for NON-UI changes -- the backend analog of
# e2e-ui-required.yml. Each tier maps a source area under omnigent/** to the
# test suite that should cover it, and an LLM judge (see scripts/test-coverage/
# check.sh) decides whether a given change actually warrants such a test --
# refactors, renames, dep bumps, and changes a unit test can't meaningfully
# cover don't trip a gate, and a trivial throwaway test doesn't satisfy one.
#
# ALL jobs are currently ADVISORY: every job only ever emits a ::warning::
# annotation and always succeeds, so nothing here can block a merge yet. This
# lets us land the workflow and observe the judge's verdicts on real PRs before
# turning anything into a gate. A FOLLOW-UP PR will flip the unit tiers
# (server / runner / runtime) back to blocking by setting their MODE to `block`
# and wiring their check names into the `Merge Ready` aggregator's REQUIRED
# array (.github/scripts/merge-ready/required.sh, via its generator) -- the
# supported way this repo makes a check required.
#
# The two kinds of job differ only in scope (kept distinct so the follow-up
# flip is a one-line MODE change per tier):
#   * UNIT tiers (server / runner / runtime): per-area judge mapping
#     omnigent/<area>/** -> its suite. The block-mode machinery (the
#     maintainer-effective `skip-e2e-test` waiver, one shared label) is wired
#     up and dormant; MODE=advise neutralizes it for now.
#   * CROSS-CUTTING tiers (integration / e2e): judge whether any omnigent/**
#     change warrants a slow, gateway-bound full-stack test. Intended to stay
#     advisory permanently.
#
# Trigger is `pull_request_target`, so the workflow + gate script always run
# from the BASE branch (main), with the base token, even for fork PRs:
#   - the PR-head copy of this file/script never runs, so a PR cannot edit
#     the gate to weaken it (same hardening as maintainer-approval.yml);
#   - `labeled` / `unlabeled` re-evaluate so applying a skip label flips green.
#
# SECURITY -- the LLM judge reads the PR's (attacker-controlled, on fork PRs)
# diff as TEXT and sends it to the gateway with the rate-limited, revocable test
# token (same accepted-risk profile as fork e2e). The job never checks out or
# runs PR-head code: it checks out ONLY .github/scripts from main (pinned, no
# persisted credentials) and reads change/label/review state via the API. The
# judge prompt is hardened against injection and fails closed. A wrong/injected
# "pass" cannot merge anything: the required `Maintainer Approval` check still
# gates merge.
#
# NO `paths:` filter on purpose: a required check that is path-filtered never
# reports on PRs that don't match, leaving the required status stuck pending and
# blocking merge forever. Each job always runs and self-determines whether its
# tier's source was touched.
#
# leak-scan-allow: pull_request_target
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions:
  contents: read

concurrency:
  group: test-coverage-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # --- Unit-tier gates (advisory for now; follow-up flips MODE to block) ---
  unit:
    name: ${{ matrix.tier }} tests (advisory)
    if: ${{ !github.event.pull_request.draft }}
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - tier: server
            src: "omnigent/server/"
            cover: "tests/server/ tests/integration/ tests/e2e/"
            cover_hint: "ideally under tests/server/, or a tests/integration/** or tests/e2e/** test"
            guidance: >-
              The repo keeps server-layer tests under tests/server/. These are fast, isolated tests of the
              API/server layer: HTTP routes, request/response handling and serialization, status codes, auth,
              and server-side state. They do NOT drive a live LLM. Server source lives under omnigent/server/.
              A test is warranted for new or changed routes, handlers, request/response schemas, status codes,
              server-side validation, or persisted server state -- not for internal refactors or logging.
          - tier: runner
            src: "omnigent/runner/"
            cover: "tests/runner/ tests/integration/ tests/e2e/"
            cover_hint: "ideally under tests/runner/, or a tests/integration/** or tests/e2e/** test"
            guidance: >-
              The repo keeps runner tests under tests/runner/. These are isolated tests of the process runner
              and transports: launching/wrapping harnesses, transport message framing and routing, and process
              lifecycle. They do NOT drive a live LLM. Runner source lives under omnigent/runner/. A test is
              warranted for new or changed transport framing, harness launch/wrap behavior, or lifecycle
              handling -- not for internal refactors or logging.
          - tier: runtime
            src: "omnigent/runtime/"
            cover: "tests/runtime/ tests/integration/ tests/e2e/"
            cover_hint: "ideally under tests/runtime/, or a tests/integration/** or tests/e2e/** test"
            guidance: >-
              The repo keeps runtime tests under tests/runtime/. These are isolated tests of the session/runtime
              core: session lifecycle, state machines, message routing, and scheduling. They do NOT drive a live
              LLM. Runtime source lives under omnigent/runtime/. A test is warranted for new or changed session
              lifecycle, state transitions, message routing, or scheduling behavior -- not for internal
              refactors or logging.
    steps:
      - name: Check out gate scripts from main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: main             # trusted base; never the PR head
          sparse-checkout: .github/scripts
          persist-credentials: false

      - name: Load maintainers
        id: maintainers
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: bash .github/scripts/merge-ready/load-maintainers.sh

      - name: Check ${{ matrix.tier }} coverage (advisory)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          MAINTAINERS: ${{ steps.maintainers.outputs.list }}
          TIER: ${{ matrix.tier }}
          # FOLLOW-UP: change to `block` (and wire the check into Merge Ready's
          # REQUIRED array) to make this tier actually gate merge.
          MODE: advise
          SRC_PREFIXES: ${{ matrix.src }}
          COVER_PREFIXES: ${{ matrix.cover }}
          # Single shared waiver across every blocking tier -- one label to manage.
          SKIP_LABEL: skip-e2e-test
          COVER_HINT: ${{ matrix.cover_hint }}
          TIER_GUIDANCE: ${{ matrix.guidance }}
          # OpenAI-compatible gateway (same secrets the e2e suites use).
          OPENAI_BASE_URL: ${{ secrets.GATEWAY_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.LLM_API_KEY }}
          JUDGE_MODEL: databricks-gpt-5-4
        run: bash .github/scripts/test-coverage/check.sh

  # --- Advisory cross-cutting tiers (NEVER block; do not mark required) ----
  # These judge whether ANY omnigent/** change (including server/runner/runtime,
  # which already have their own blocking unit gates above) warrants a slow,
  # cross-cutting integration/e2e test. They only ever emit a ::warning::
  # annotation and always succeed -- a nudge to add full-stack coverage without
  # gating merge, since these suites are gateway-bound and often legitimately
  # deferred. Do NOT add these check names to branch protection.
  advisory:
    name: ${{ matrix.tier }} tests (advisory)
    if: ${{ !github.event.pull_request.draft }}
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - tier: integration
            cover: "tests/integration/ tests/e2e/"
            cover_hint: "under tests/integration/ (or tests/e2e/)"
            guidance: >-
              The repo keeps cross-cutting integration tests under tests/integration/. These exercise
              several components wired together (e.g. server + runtime, or runner + runtime) without the
              full live-workflow weight of e2e. Backend source lives under omnigent/. An integration test
              is warranted when a change alters behavior at the seam BETWEEN components that no single
              tier's unit test would catch -- not for logic contained within one component, which its own
              unit suite covers.
          - tier: e2e
            cover: "tests/e2e/ tests/integration/"
            cover_hint: "under tests/e2e/ (or tests/integration/)"
            guidance: >-
              The repo keeps end-to-end tests under tests/e2e/. These drive real workflows against a live
              LLM gateway and exercise cross-component, full-stack behavior: sessions and the runtime
              together, sub-agent spawning/parking/fan-out, client-tool tunneling, the chat/PATCH/GET
              response routes, native harness bridges (Claude/Codex), transports, and steering/cancellation
              across components. They are slow and gateway-bound, so an e2e test is warranted ONLY for
              genuine end-to-end behavior that isolated unit tests cannot capture -- not for logic a unit
              test covers well. Backend source lives under omnigent/.
    steps:
      - name: Check out gate scripts from main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: main
          sparse-checkout: .github/scripts
          persist-credentials: false

      - name: Advise on ${{ matrix.tier }} coverage
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          MAINTAINERS: ""        # unused in advise mode
          TIER: ${{ matrix.tier }}
          MODE: advise
          # Any backend change can warrant a cross-cutting test; judge decides.
          SRC_PREFIXES: "omnigent/"
          COVER_PREFIXES: ${{ matrix.cover }}
          SKIP_LABEL: skip-e2e-test   # unused in advise mode
          COVER_HINT: ${{ matrix.cover_hint }}
          TIER_GUIDANCE: ${{ matrix.guidance }}
          OPENAI_BASE_URL: ${{ secrets.GATEWAY_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.LLM_API_KEY }}
          JUDGE_MODEL: databricks-gpt-5-4
        run: bash .github/scripts/test-coverage/check.sh
