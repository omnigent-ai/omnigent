name: Crabbox hydrate

# Prepared by Crabbox Actions hydration before repo-local jobs run on a
# leased box. It is also workflow_dispatch-able for the GitHub-runner
# hydration path, but it does not run on PRs by itself.

on:
  workflow_dispatch: {}

permissions:
  contents: read

env:
  OMNIGENT_SKIP_WEB_UI: "true"
  UV_INDEX_URL: https://pypi.org/simple
  PIP_INDEX_URL: https://pypi.org/simple

jobs:
  hydrate:
    name: Hydrate Crabbox lease
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          enable-cache: true

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ap-web/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux ripgrep bubblewrap
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Install Python dependencies
        run: uv sync --extra all --extra dev

      - name: Install harness CLIs
        working-directory: .github/ci-deps
        run: |
          npm install --ignore-scripts
          node node_modules/@anthropic-ai/claude-code/install.cjs

      - name: Install ap-web dependencies
        working-directory: ap-web
        run: npm ci --legacy-peer-deps --no-audit --no-fund
