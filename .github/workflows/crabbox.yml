name: Crabbox

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - ".crabbox.yaml"
      - ".github/workflows/crabbox.yml"
      - ".github/workflows/crabbox-hydrate.yml"
      - "docs/CRABBOX.md"
      - "scripts/crabbox/**"
  push:
    branches:
      - main
    paths:
      - ".crabbox.yaml"
      - ".github/workflows/crabbox.yml"
      - ".github/workflows/crabbox-hydrate.yml"
      - "docs/CRABBOX.md"
      - "scripts/crabbox/**"
  workflow_dispatch:
    inputs:
      job:
        description: "Crabbox job to run."
        required: true
        default: e2e
        type: choice
        options:
          - lint
          - pytest
          - islo-smoke
          - anthropic-smoke
          - e2e
          - e2e-ui
          - release-smoke
          - pr-gates
      live:
        description: "Actually lease a box and run the selected job. False only validates dry-runs."
        required: true
        default: false
        type: boolean
      github_runner:
        description: "Use Crabbox GitHub-runner hydration for the live run."
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: crabbox-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # Crabbox is built from source pinned to openclaw/crabbox#428 (Islo create-payload fix):
  # the v0.32.0 release sends default image/workdir/capacity fields that make Islo sandbox
  # creation fail ("ubuntu:26.04" boxes never start). TODO: revert to a release download
  # (CRABBOX_VERSION) once a tagged crabbox release includes #428.
  CRABBOX_PR: "428"
  CRABBOX_REF: 1053c50c6350b032dae76b8a486d65835849733c
  GH_TOKEN: ${{ github.token }}

jobs:
  validate:
    name: Crabbox config
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"

      - name: Build Crabbox from source (openclaw/crabbox#428 Islo fix)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          git -C "$tmp" init -q crabbox
          git -C "$tmp/crabbox" remote add origin https://github.com/openclaw/crabbox
          git -C "$tmp/crabbox" fetch -q --depth 1 origin "refs/pull/${CRABBOX_PR}/head"
          git -C "$tmp/crabbox" checkout -q FETCH_HEAD
          got="$(git -C "$tmp/crabbox" rev-parse HEAD)"
          if [ "$got" != "$CRABBOX_REF" ]; then
            echo "::error::crabbox#${CRABBOX_PR} head is $got, expected pinned $CRABBOX_REF"
            exit 1
          fi
          (cd "$tmp/crabbox" && go build -o crabbox ./cmd/crabbox)
          sudo install -m 0755 "$tmp/crabbox/crabbox" /usr/local/bin/crabbox
          crabbox --version

      - name: List configured jobs
        run: crabbox job list

      - name: Dry-run configured jobs
        run: |
          set -euo pipefail
          for job in lint pytest islo-smoke anthropic-smoke e2e e2e-ui release-smoke pr-gates; do
            echo "::group::crabbox job run --dry-run $job"
            crabbox job run --dry-run "$job"
            echo "::endgroup::"
          done

      - name: Check Crabbox scripts parse
        run: bash -n scripts/crabbox/*.sh

  run:
    name: Crabbox live run
    needs: validate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.live }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"

      - name: Build Crabbox from source (openclaw/crabbox#428 Islo fix)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          git -C "$tmp" init -q crabbox
          git -C "$tmp/crabbox" remote add origin https://github.com/openclaw/crabbox
          git -C "$tmp/crabbox" fetch -q --depth 1 origin "refs/pull/${CRABBOX_PR}/head"
          git -C "$tmp/crabbox" checkout -q FETCH_HEAD
          got="$(git -C "$tmp/crabbox" rev-parse HEAD)"
          if [ "$got" != "$CRABBOX_REF" ]; then
            echo "::error::crabbox#${CRABBOX_PR} head is $got, expected pinned $CRABBOX_REF"
            exit 1
          fi
          (cd "$tmp/crabbox" && go build -o crabbox ./cmd/crabbox)
          sudo install -m 0755 "$tmp/crabbox/crabbox" /usr/local/bin/crabbox
          crabbox --version

      - name: Configure Crabbox broker
        env:
          CRABBOX_BROKER_URL: ${{ secrets.CRABBOX_BROKER_URL }}
          CRABBOX_TOKEN: ${{ secrets.CRABBOX_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CRABBOX_BROKER_URL:-}" ] || [ -z "${CRABBOX_TOKEN:-}" ]; then
            echo "::notice::CRABBOX_BROKER_URL/CRABBOX_TOKEN not configured; using existing runner Crabbox config"
            exit 0
          fi
          printf '%s' "$CRABBOX_TOKEN" | crabbox config set-broker \
            -url "$CRABBOX_BROKER_URL" \
            -token-stdin

      - name: Run selected Crabbox job
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISLO_API_KEY: ${{ secrets.ISLO_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          GATEWAY_BASE_URL: ${{ secrets.GATEWAY_BASE_URL }}
        run: |
          set -euo pipefail
          args=()
          if [ "${{ inputs.github_runner }}" = "true" ]; then
            args+=(--github-runner)
          fi
          crabbox job run "${args[@]}" "${{ inputs.job }}"
