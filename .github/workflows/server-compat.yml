name: Server Backwards-Compat

# Runs main's network test suites (tests/e2e, tests/integration) against a
# PINNED OLDER server, to catch backwards-incompatible server changes before
# release. Only the server subprocess is the old build; the client, runner,
# and test code are all main. See docs/SERVER_VERSION_COMPAT_CI.md.
#
# Mechanism: build the old server from its git tag into a separate venv, then
# point the live_server fixtures at it via OMNIGENT_COMPAT_SERVER_PYTHON (which
# also drops the worktree PYTHONPATH shadow so the old install actually
# resolves). OMNIGENT_COMPAT_SERVER_VERSION tells the min_server_version skip
# which features the old server is too old to have.
#
# Triggers:
#   workflow_dispatch   manual; `server_version` input picks the old tag.
#   schedule            nightly; pins the latest non-rc release tag.

on:
  workflow_dispatch:
    inputs:
      server_version:
        description: "Old server tag to test against, e.g. v0.1.1. Empty = latest release tag."
        required: false
        default: ""
      parallelism:
        description: "pytest workers per e2e shard (-n). Default 2 (4 shards * 2 = 8 concurrent gateway calls)."
        required: false
        default: "2"
  schedule:
    # 11:00 UTC — after e2e.yml (09:00) and integration.yml (09:30) settle,
    # so a compat failure is distinguishable from a baseline-suite failure.
    - cron: "0 11 * * *"

concurrency:
  group: server-compat-${{ github.workflow }}-${{ github.event.inputs.server_version || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # No ap-web SPA build during any `uv sync` / old-server install: this job
  # never serves the bundle and the hardened runner's npm has no mirror.
  OMNIGENT_SKIP_WEB_UI: "true"
  # Never let a spawned server pick up the runner's own credentials.
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  CODEX: ""
  CLAUDE_CODE: ""

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # tests/e2e against the pinned old server (sharded, databricks harness).
  # ─────────────────────────────────────────────────────────────────────
  compat-e2e:
    name: Compat e2e (server ${{ github.event.inputs.server_version || 'latest' }}, shard ${{ matrix.shard_id }}/4)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - { shard_id: 0, num_shards: 4 }
          - { shard_id: 1, num_shards: 4 }
          - { shard_id: 2, num_shards: 4 }
          - { shard_id: 3, num_shards: 4 }
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          # Full history + tags so we can `git worktree add` the old tag.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          enable-cache: true

      - name: Set LLM credentials
        run: echo "LLM_API_KEY=${{ secrets.LLM_API_KEY }}" >> "$GITHUB_ENV"

      - name: Write gateway profile (~/.databrickscfg)
        env:
          GATEWAY_BASE_URL: ${{ secrets.GATEWAY_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          host="${GATEWAY_BASE_URL%/serving-endpoints}"
          cat > "$HOME/.databrickscfg" <<EOF
          [default]
          host  = $host
          token = $LLM_API_KEY
          EOF
          echo "DATABRICKS_BEARER=$LLM_API_KEY" >> "$GITHUB_ENV"

      - name: Install project and dev dependencies (main)
        run: uv sync --extra all --extra dev

      - name: Build the pinned old server
        # Bind the untrusted input to an env var and validate it before use;
        # never interpolate ${{ }} into a shell command.
        env:
          SERVER_VERSION_INPUT: ${{ github.event.inputs.server_version }}
        run: |
          tag="$SERVER_VERSION_INPUT"
          if [ -z "$tag" ]; then
            tag="$(git tag --sort=-v:refname | grep -vi rc | head -1)"
          fi
          if ! [[ "$tag" =~ ^v?[0-9]+\.[0-9]+(\.[0-9]+)?([a-z0-9.]*)?$ ]]; then
            echo "Invalid server_version: '$tag'" >&2; exit 1
          fi
          src="$RUNNER_TEMP/server-src"
          venv="$RUNNER_TEMP/server-env"
          git worktree add --detach "$src" "$tag"
          uv venv --python 3.12 "$venv"
          # All three packages editable from the old worktree so the old
          # server's ==<old> SDK cross-pins resolve without an index.
          uv pip install --python "$venv/bin/python" \
            -e "$src" -e "$src/sdks/python-client" -e "$src/sdks/ui"
          "$venv/bin/omnigent" --version
          echo "OMNIGENT_COMPAT_SERVER_PYTHON=$venv/bin/python" >> "$GITHUB_ENV"
          echo "OMNIGENT_COMPAT_SERVER_VERSION=${tag#v}" >> "$GITHUB_ENV"

      - name: Install binary dependencies
        working-directory: .github/ci-deps
        run: |
          sudo apt-get install -y tmux bubblewrap
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          npm install --ignore-scripts
          node node_modules/@anthropic-ai/claude-code/install.cjs
          echo "${GITHUB_WORKSPACE}/.github/ci-deps/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Run e2e against the old server
        timeout-minutes: 30
        env:
          PARALLELISM_INPUT: ${{ github.event.inputs.parallelism || '2' }}
          SHARD_ID: ${{ matrix.shard_id }}
          NUM_SHARDS: ${{ matrix.num_shards }}
          # Compat runs are the full pass; exclude nothing extra beyond the
          # baseline. Keep nightly tests out unless this is a scheduled run.
          NIGHTLY_FULL: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
          E2E_TMP_BASE: /tmp/omnigent-compat-e2e-${{ github.run_id }}-shard${{ matrix.shard_id }}
          OMNIGENT_TEST_MODEL_SPREAD: '1'
          OMNIGENT_TEST_MODEL_POOL_GPT: 'databricks-gpt-5-5,databricks-gpt-5-4-mini'
        run: |
          if ! [[ "$PARALLELISM_INPUT" =~ ^[1-9][0-9]?$ ]]; then
            echo "Invalid parallelism input: $PARALLELISM_INPUT" >&2; exit 1
          fi
          mkdir -p "$E2E_TMP_BASE"
          EXTRA_ARGS=()
          if [[ "$NIGHTLY_FULL" != "true" ]]; then
            EXTRA_ARGS+=(-m "not nightly")
          fi
          uv run pytest tests/e2e/ \
            --llm-api-key "$LLM_API_KEY" \
            --profile default \
            --harness databricks \
            -n "$PARALLELISM_INPUT" \
            --dist=loadscope \
            --max-worker-restart=0 \
            --shard-id="$SHARD_ID" \
            --num-shards="$NUM_SHARDS" \
            --timeout=180 \
            --timeout-method=thread \
            --basetemp="$E2E_TMP_BASE" \
            --junitxml="$E2E_TMP_BASE/junit.xml" \
            -v --tb=long --showlocals --log-level=INFO -r a \
            "${EXTRA_ARGS[@]}" \
            || { rc=$?; [ "$rc" -eq 5 ] && echo "::notice::No tests collected in this shard; treating as a pass." || exit "$rc"; }

      - name: Upload server logs on failure
        if: failure() || cancelled()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: compat-e2e-logs-${{ github.run_id }}-shard${{ matrix.shard_id }}
          path: |
            /tmp/omnigent-compat-e2e-${{ github.run_id }}-shard${{ matrix.shard_id }}/**/server.log
            /tmp/omnigent-compat-e2e-${{ github.run_id }}-shard${{ matrix.shard_id }}/**/runner.log
            /tmp/omnigent-compat-e2e-${{ github.run_id }}-shard${{ matrix.shard_id }}/junit.xml
          retention-days: 7
          if-no-files-found: warn
          include-hidden-files: true

  # ─────────────────────────────────────────────────────────────────────
  # tests/integration against the pinned old server (per-harness matrix).
  # ─────────────────────────────────────────────────────────────────────
  compat-integration:
    name: Compat integration (server ${{ github.event.inputs.server_version || 'latest' }}, ${{ matrix.harness }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { harness: claude-sdk, model: databricks-claude-sonnet-4-6, workers: 4 }
          - { harness: openai-agents, model: databricks-gpt-5-4-mini, workers: 4 }
          - { harness: codex, model: databricks-gpt-5-5, workers: 2 }
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          enable-cache: true

      - name: Set LLM credentials
        run: echo "LLM_API_KEY=${{ secrets.LLM_API_KEY }}" >> "$GITHUB_ENV"

      - name: Write gateway profile (~/.databrickscfg)
        env:
          GATEWAY_BASE_URL: ${{ secrets.GATEWAY_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          host="${GATEWAY_BASE_URL%/serving-endpoints}"
          cat > "$HOME/.databrickscfg" <<EOF
          [default]
          host  = $host
          token = $LLM_API_KEY
          EOF
          echo "DATABRICKS_BEARER=$LLM_API_KEY" >> "$GITHUB_ENV"

      - name: Install project and dev dependencies (main)
        run: uv sync --extra all --extra dev

      - name: Build the pinned old server
        env:
          SERVER_VERSION_INPUT: ${{ github.event.inputs.server_version }}
        run: |
          tag="$SERVER_VERSION_INPUT"
          if [ -z "$tag" ]; then
            tag="$(git tag --sort=-v:refname | grep -vi rc | head -1)"
          fi
          if ! [[ "$tag" =~ ^v?[0-9]+\.[0-9]+(\.[0-9]+)?([a-z0-9.]*)?$ ]]; then
            echo "Invalid server_version: '$tag'" >&2; exit 1
          fi
          src="$RUNNER_TEMP/server-src"
          venv="$RUNNER_TEMP/server-env"
          git worktree add --detach "$src" "$tag"
          uv venv --python 3.12 "$venv"
          uv pip install --python "$venv/bin/python" \
            -e "$src" -e "$src/sdks/python-client" -e "$src/sdks/ui"
          "$venv/bin/omnigent" --version
          echo "OMNIGENT_COMPAT_SERVER_PYTHON=$venv/bin/python" >> "$GITHUB_ENV"
          echo "OMNIGENT_COMPAT_SERVER_VERSION=${tag#v}" >> "$GITHUB_ENV"

      - name: Install binary dependencies
        working-directory: .github/ci-deps
        run: |
          sudo apt-get install -y tmux bubblewrap
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          npm install --ignore-scripts
          node node_modules/@anthropic-ai/claude-code/install.cjs
          echo "${GITHUB_WORKSPACE}/.github/ci-deps/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Run integration journeys against the old server
        timeout-minutes: 30
        env:
          HARNESS: ${{ matrix.harness }}
          MODEL: ${{ matrix.model }}
          WORKERS: ${{ matrix.workers }}
          INTEGRATION_TMP_BASE: /tmp/omnigent-compat-integration-${{ github.run_id }}-${{ matrix.harness }}
        run: |
          mkdir -p artifacts "$INTEGRATION_TMP_BASE"
          env -u OPENAI_API_KEY -u ANTHROPIC_API_KEY -u DATABRICKS_TOKEN \
            uv run pytest tests/integration/ \
              --integration \
              --model "$MODEL" \
              --harness "$HARNESS" \
              --profile default \
              --llm-api-key "$LLM_API_KEY" \
              -n "$WORKERS" \
              --dist=loadscope \
              --timeout=180 \
              --timeout-method=thread \
              --basetemp="$INTEGRATION_TMP_BASE" \
              --junitxml="artifacts/compat-integration-${HARNESS}.xml" \
              --capture=no --log-cli-level=INFO \
              -v --tb=long --showlocals --log-level=INFO -r a

      - name: Upload server/runner logs on failure
        if: failure() || cancelled()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: compat-integration-logs-${{ matrix.harness }}-${{ github.run_id }}
          path: |
            /tmp/omnigent-compat-integration-${{ github.run_id }}-${{ matrix.harness }}/**/server.log
            /tmp/omnigent-compat-integration-${{ github.run_id }}-${{ matrix.harness }}/**/runner.log
          retention-days: 7
          if-no-files-found: warn
          include-hidden-files: true
